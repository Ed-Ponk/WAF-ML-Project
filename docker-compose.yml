services:
  # ── Base de datos de telemetría ──────────────────────────────────
  database:
    image: postgres:15-alpine
    container_name: waf-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - waf_db_data:/var/lib/postgresql/data
    networks:
      - waf-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Capa 2: Motor de Machine Learning
  ml-engine:
    build: ./ml-engine
    container_name: waf-ml-engine
    restart: unless-stopped
    networks:
      - waf-backend
      - pyme-security-net
    volumes:
      - ./ml-engine:/app
    command: uvicorn app:app --host 0.0.0.0 --port ${ML_ENGINE_PORT}
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@database:${DB_PORT}/${DB_NAME}
      - THRESHOLD_BLOCK=${THRESHOLD_BLOCK}
      - THRESHOLD_LOG=${THRESHOLD_LOG}
      - WAF_DEBUG=${WAF_DEBUG}
    deploy:
      resources:
        limits:
          memory: ${ML_MEMORY_LIMIT}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:${ML_ENGINE_PORT}/health', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 50s

  # Capa 1: Reverse Proxy (Nginx)
  proxy:
    image: nginx:latest
    container_name: waf-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/403.html:/usr/share/nginx/html/403.html:ro
      - ./nginx/pyme_index.html:/usr/share/nginx/html/pyme/pyme_index.html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - waf-frontend
      - waf-backend
      - pyme-security-net
    depends_on:
      - ml-engine

  # ── Capa 0a: PYME React Frontend ──────────────────────────────────
  pyme-react-frontend:
    build:
      context: ../../thesis/app-pyme/atel-front
    container_name: pyme-react-frontend
    restart: unless-stopped
    networks:
      - pyme-security-net
    environment:
      - VITE_LINK_BACKEND=/api/v1
    deploy:
      resources:
        limits:
          memory: 512M
    # NO ports exposed — traffic enters through proxy only (R1)

  # ── Capa 0b: PYME PHP Backend ────────────────────────────────────
  pyme-php-backend:
    build:
      context: ../../thesis/app-pyme/atel-back
    container_name: pyme-php-backend
    restart: unless-stopped
    networks:
      - pyme-security-net
    deploy:
      resources:
        limits:
          memory: 256M
    # NO ports directive — backend is NOT exposed to host (R1/R6)

  vpn:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: waf-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - SERVERURL=auto
      - PEERS=1 # Genera 1 cliente (puedes poner 'admin,trabajador1')
      - PEERDNS=auto
    ports:
      - "51820:51820/udp"
    volumes:
      - ./config/vpn:/config
    networks:
      - waf-frontend
      - waf-backend
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1

  # Backend simulado PYME — app web de prueba (Si se logra integrar el WAF con la app pyme, entonces comentar todo este servicio)
  #pyme-app-back:
  #image: nginx:alpine
  #container_name: waf-pyme-back
  #volumes:
  # - ./nginx/pyme_index.html:/usr/share/nginx/html/index.html:ro
  #networks:
  # - waf-backend

networks:
  waf-frontend:
    driver: bridge
  waf-backend:
    driver: bridge
  pyme-security-net:
    driver: bridge
    name: pyme-security-net

volumes:
  waf_db_data:

