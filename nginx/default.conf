server {
    listen 80;

    # ── Timeouts adaptativos ──────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;

    # ── Error catchment (server-level) ────────────────────────────
    # Auth_request failures (ACCESS phase) are NOT caught by location-level
    # error_page (which only applies to CONTENT phase / proxy_pass).
    # Server-level error_page catches ALL 5xx regardless of phase.
    error_page 500 502 503 504 =200 /pyme/pyme_index.html;

    # ══════════════════════════════════════════════════════════════════
    # STATIC ASSETS — Frontend SPA (NO ML check)
    # ══════════════════════════════════════════════════════════════════
    location / {
        proxy_pass http://pyme-react-frontend:5173;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ══════════════════════════════════════════════════════════════════
    # API TRAFFIC — WAF validation then PHP backend
    # ══════════════════════════════════════════════════════════════════
    location /api/ {
        auth_request /validate;

        proxy_pass_request_body on;

        error_page 403 =403 /403.html;

        proxy_pass http://pyme-php-backend:80;
        # No trailing slash — preserves /api prefix for PHP routes

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
    }

    # ══════════════════════════════════════════════════════════════════
    # VALIDACIÓN WAF — Motor ML interno
    # ══════════════════════════════════════════════════════════════════
    location = /validate {
        internal;

        # When ML engine is unreachable (5xx/504), return 403 so auth_request
        # treats it as "denied" → main request error_page 403 catches it.
        error_page 500 502 503 504 =403 /403.html;

        proxy_pass http://ml-engine:8000/waf_core;

        proxy_pass_request_body on;
        proxy_set_header Content-Length $content_length;
        proxy_set_header X-Original-URI    $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header Content-Type      $content_type;

        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;

        client_max_body_size 10M;
        client_body_buffer_size 128k;
    }

    # ══════════════════════════════════════════════════════════════════
    # PÁGINAS DE ERROR
    # ══════════════════════════════════════════════════════════════════
    location = /403.html {
        root /usr/share/nginx/html;
    }

    location = /pyme/pyme_index.html {
        alias /usr/share/nginx/html/pyme/pyme_index.html;
    }
}
