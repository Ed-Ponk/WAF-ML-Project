server {
    listen 80;

    # Página personalizada para bloqueos (Capa de Respuesta)
    error_page 403 /403.html;
    proxy_intercept_errors on;

    # ── Timeouts adaptativos ──────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;


    # ══════════════════════════════════════════════════════════════════
    # 1. INTEGRACIÓN FRONTEND (React)
    # ══════════════════════════════════════════════════════════════════
    #location / {
    #    auth_request /validate; # Primero pasa por la IA

        # En lugar de enviar a otro contenedor, servimos el archivo local
    #    root /usr/share/nginx/html/pyme;
    #    index pyme_index.html;
    #    try_files $uri $uri/ /pyme_index.html;
    #}
  
    # ══════════════════════════════════════════════════════════════
    # RUTA PRINCIPAL — Proxy al backend de la PYME
    # El backend se configura en .env como PYME_BACKEND_URL
    # ══════════════════════════════════════════════════════════════
    location / {
        auth_request /validate;
 
        # backend dinámico
        proxy_pass ${PYME_BACKEND_URL};

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 403 = /403.html;
        error_page 502 503 504 = @fallback;
    }          

    # ══════════════════════════════════════════════════════════════
    # FALLBACK — Si backend no está disponible
    # ══════════════════════════════════════════════════════════════
    location @fallback {
        root  /usr/share/nginx/html/pyme;
        index pyme_index.html;
        try_files $uri /pyme_index.html;
    }

    # ══════════════════════════════════════════════════════════════
    # VALIDACIÓN WAF — Motor ML interno
    # ══════════════════════════════════════════════════════════════
    location = /validate {
        internal;

        proxy_pass http://ml-engine:${ML_ENGINE_PORT}/waf_core;

        proxy_pass_request_body on;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI    $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header Content-Type      $content_type;

        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }


    # ══════════════════════════════════════════════════════════════
    # PÁGINAS DE ERROR
    # ══════════════════════════════════════════════════════════════
    location = /403.html {
        root /usr/share/nginx/html;
    }
}